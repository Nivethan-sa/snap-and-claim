<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Snap & Claim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600;700&display=swap');

        :root {
            --primary-color: #0056b3;
            --light-color: #ffffff;
            --dark-color: #343a40;
            --text-color: #495057;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            height: 100vh;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-container {
            display: flex;
            width: 900px;
            min-height: 600px;
            background-color: var(--light-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Left Branding Panel */
        .branding-panel {
            flex: 1;
            background: linear-gradient(rgba(0, 86, 179, 0.8), rgba(0, 86, 179, 0.8)), url('https://placehold.co/600x800/EFEFEF/CCCCCC?text=Car+Silhouette');
            background-size: cover;
            background-position: center;
            color: var(--light-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .branding-panel h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .branding-panel p {
            font-size: 1.1rem;
            max-width: 300px;
        }

        /* Right Form Panel */
        .form-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-panel h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--dark-color);
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: var(--light-color);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background-color: #004494;
        }

        .error-message {
            color: #dc3545;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }

        .login-link {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }
        
        /* Responsive */
        @media(max-width: 900px) {
            .signup-container {
                flex-direction: column;
                width: 90%;
                height: auto;
                max-width: 450px;
            }
            .branding-panel {
                padding: 30px;
                display: none; /* Hide branding on small screens for a cleaner form */
            }
        }

    </style>
</head>
<body>
    <div class="signup-container">
        <div class="branding-panel">
            <h1>Snap & Claim</h1>
            <p>Your simplified digital solution for car insurance claims.</p>
        </div>
        <div class="form-panel">
            <h2>Create an Account</h2>
            
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="/signup" method="POST" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>
                
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>
            <p class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Login Here</a>
            </p>
        </div>
    </div>
</body>
</html>
